{% extends "base.html" %}

{% block title %}登录 - QuizMaster{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded shadow">
    <h1 class="text-2xl font-bold mb-6 text-center">登录</h1>
    <form method="post" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">用户名</label>
            <input type="text" name="username" required class="w-full border rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">密码</label>
            <input type="password" name="password" required class="w-full border rounded px-3 py-2">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
            登录
        </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-600">
        还没有账号？<a href="{{ url_for('auth.register') }}" class="text-blue-600 hover:underline">立即注册</a>
    </p>
</div>
{% endblock %}
