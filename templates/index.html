{% extends "base.html" %}

{% block title %}首页 - QuizMaster{% endblock %}

{% block content %}
<div class="text-center py-12">
    <h1 class="text-4xl font-bold text-blue-700 mb-4">QuizMaster</h1>
    <p class="text-lg text-gray-600 mb-8">在线自测练习平台 · 记录错题 · 统计薄弱点</p>

    {% if current_user.is_authenticated %}
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-3xl mx-auto">
            <a href="{{ url_for('quiz.setup') }}" class="bg-white p-6 rounded shadow hover:shadow-lg transition">
                <div class="text-2xl mb-2">📝</div>
                <div class="font-bold">开始练习</div>
                <div class="text-sm text-gray-500">随机抽题 / 按章节 / 按知识点</div>
            </a>
            <a href="{{ url_for('question.list_questions') }}" class="bg-white p-6 rounded shadow hover:shadow-lg transition">
                <div class="text-2xl mb-2">📚</div>
                <div class="font-bold">管理题库</div>
                <div class="text-sm text-gray-500">录入、编辑、导入题目</div>
            </a>
            <a href="{{ url_for('stats.index') }}" class="bg-white p-6 rounded shadow hover:shadow-lg transition">
                <div class="text-2xl mb-2">📊</div>
                <div class="font-bold">学习统计</div>
                <div class="text-sm text-gray-500">正确率 / 知识点 / 错题本</div>
            </a>
        </div>
    {% else %}
        <div class="space-x-4">
            <a href="{{ url_for('auth.login') }}" class="inline-block bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">登录</a>
            <a href="{{ url_for('auth.register') }}" class="inline-block bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">注册</a>
        </div>
    {% endif %}
</div>
{% endblock %}
